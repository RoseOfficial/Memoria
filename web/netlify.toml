[build]
  base = "web"
  command = "pnpm build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  PNPM_FLAGS = "--frozen-lockfile"

# Deploy previews and branch deploys use:
#   https://<preview-slug>--<site-name>.netlify.app
# Server CORS AllowedOriginPattern must match that.

# NEXT_PUBLIC_API_BASE_URL is set per environment in the Netlify UI, not here,
# because it differs between production and preview deploys.
