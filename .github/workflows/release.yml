name: Release Memoria Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        run: |
          wget -q https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -O dalamud.zip
          unzip -q dalamud.zip -d ~/dalamud

      - name: Restore plugin
        run: dotnet restore Memoria/Memoria.csproj

      - name: Build plugin
        run: dotnet build Memoria/Memoria.csproj -c Release --no-restore -p:DalamudLibPath=$HOME/dalamud/

      - name: Stage release archive
        run: cp Memoria/dist/win-x64/Memoria/latest.zip latest.zip

      - name: Extract Version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract Patch Notes
        id: changelog
        if: hashFiles('CHANGELOG.md') != ''
        run: |
          {
            echo 'notes<<EOF'
            sed -n '/<!-- LATEST-START -->/,/<!-- LATEST-END -->/p' CHANGELOG.md | sed '1d;$d' | sed 's/^## .*//'
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Update per-plugin repo.json
        run: |
          # Memoria's own repo.json is a backward-compat per-plugin URL.
          # The shared aggregator (Olympus/repo.json) is updated manually on release day.
          NEW_VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ github.ref_name }}"
          ZIP_URL="https://github.com/RoseOfficial/Memoria/releases/download/${TAG}/latest.zip"
          MEMORIA_API=$(jq -r '.DalamudApiLevel' Memoria/Memoria.json)
          jq --arg v "$NEW_VERSION" --arg url "$ZIP_URL" --argjson api "$MEMORIA_API" '
            map(
              if .InternalName == "Memoria" then
                .AssemblyVersion = $v
                | .DalamudApiLevel = $api
                | .DownloadLinkInstall = $url
                | .DownloadLinkTesting = $url
                | .DownloadLinkUpdate = $url
              else . end
            )
          ' repo.json > repo.json.tmp
          mv repo.json.tmp repo.json
          if ! jq -e --arg v "$NEW_VERSION" 'any(.[]; .InternalName == "Memoria" and .AssemblyVersion == $v)' repo.json > /dev/null; then
            echo "ERROR: Memoria entry missing or version not updated in repo.json" >&2
            cat repo.json >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.zip
          generate_release_notes: true

      - name: Commit repo.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add repo.json
          if git diff --cached --quiet; then
            echo "repo.json unchanged, skipping commit"
          else
            git commit -m "Update repo.json for ${{ github.ref_name }}"
            git push origin main
          fi

      - name: Discord Notification
        if: success() && env.DISCORD_WEBHOOK != ''
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          title: "Memoria ${{ github.ref_name }}"
          description: |
            ${{ steps.changelog.outputs.notes }}

            **[Download from GitHub](https://github.com/RoseOfficial/Memoria/releases/tag/${{ github.ref_name }})** • Refresh your plugin list to update
          color: 0x5865F2
