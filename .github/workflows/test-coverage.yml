name: Test Coverage and CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-coverage:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
    
    - name: Restore server dependencies
      run: dotnet restore MemoriaServer/MemoriaServer.csproj
    
    - name: Restore server test dependencies
      run: dotnet restore MemoriaServer.Tests/MemoriaServer.Tests.csproj
    
    - name: Restore test utilities dependencies
      run: dotnet restore TestUtilities/TestUtilities.csproj
    
    - name: Build server
      run: dotnet build MemoriaServer/MemoriaServer.csproj --no-restore --configuration Release
    
    - name: Build test utilities
      run: dotnet build TestUtilities/TestUtilities.csproj --no-restore --configuration Release
    
    - name: Build server tests specifically
      run: dotnet build MemoriaServer.Tests/MemoriaServer.Tests.csproj --no-restore --configuration Release
    
    - name: Install coverage tools
      run: |
        dotnet tool install --global dotnet-coverage
        dotnet tool install --global dotnet-reportgenerator-globaltool
    
    - name: Run server tests with coverage
      run: |
        dotnet-coverage collect --settings coverage.settings --output coverage.cobertura.xml "dotnet test MemoriaServer.Tests/MemoriaServer.Tests.csproj --no-build --configuration Release --logger trx --results-directory TestResults/"
    
    - name: Note about Plugin Tests and Build
      run: |
        echo "📝 Note: Plugin tests (Memoria.Tests) and plugin builds are not run in CI because they depend on Dalamud assemblies"
        echo "   which are only available in the FFXIV game environment. Run them locally with:"
        echo "   dotnet test Memoria.Tests/Memoria.Tests.csproj"
        echo "   dotnet build Memoria/Memoria.csproj --configuration Release"
    
    - name: Generate coverage report
      run: |
        reportgenerator -reports:coverage.cobertura.xml -targetdir:CoverageReport -reporttypes:"Html;JsonSummary"
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.cobertura.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: TestResults/
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: CoverageReport/
    
    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: 5monkeys/cobertura-action@master
      with:
        path: coverage.cobertura.xml
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        minimum_coverage: 70
        fail_below_threshold: false
        show_missing: true

  build-server:
    runs-on: windows-latest
    needs: test-coverage
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Restore dependencies
      run: dotnet restore MemoriaServer/MemoriaServer.csproj
    
    - name: Build server (Release)
      run: dotnet build MemoriaServer/MemoriaServer.csproj --no-restore --configuration Release
    
    - name: Publish server
      run: dotnet publish MemoriaServer/MemoriaServer.csproj --no-restore --configuration Release --output ./publish
    
    - name: Upload server artifacts
      uses: actions/upload-artifact@v4
      with:
        name: server-build
        path: ./publish/

  web-build:
    name: Build web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.memoria.gg

      - name: Unit tests
        run: pnpm test